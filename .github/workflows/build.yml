name: Build & Release

# Compila la aplicación para macOS Intel, macOS Apple Silicon, Windows y Linux
# y publica un release en este repositorio público.
#
# Secreto requerido (Settings → Secrets → Actions):
#   APP_REPO_TOKEN — PAT con lectura sobre xavierbasc/pdf-anonymizer-app
#
# Cómo lanzar:
#   Actions → Build & Release → Run workflow → introducir versión (ej. v1.0.0)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del release (ej: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon arm64
            platform: macOS-AppleSilicon
            artifact: PDFAnonymizer-macOS-AppleSilicon.zip

          - os: windows-latest
            platform: Windows
            artifact: PDFAnonymizer-Windows.zip

          - os: ubuntu-22.04
            platform: Linux
            artifact: PDFAnonymizer-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout app source (repo privado)
        uses: actions/checkout@v4
        with:
          repository: xavierbasc/pdf-anonymizer-app
          token: ${{ secrets.APP_REPO_TOKEN }}

      # ── Linux: headers de GTK3 para compilar wxPython desde fuente ─────────────
      # wxPython no tiene wheel precompilado para Ubuntu 22.04 + Python 3.12;
      # necesita libgtk-3-dev para compilar. Se evita libgstreamer-dev (tiene
      # dependencias rotas en Ubuntu 22.04 runners) y se instala solo el runtime.
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libglib2.0-dev libcairo2-dev \
            libgdk-pixbuf2.0-dev libpango1.0-dev \
            pkg-config build-essential \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 \
            freeglut3 libsdl2-2.0-0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Reinstall CPU-only torch (Linux)
        if: runner.os == 'Linux'
        run: pip install torch==2.2.2+cpu --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Build with PyInstaller
        run: pyinstaller app.spec

      # ── Empaquetar ──────────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../${{ matrix.artifact }} PDFAnonymizer.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar -czf ../${{ matrix.artifact }} PDFAnonymizer/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\PDFAnonymizer -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  # ── Release público en este mismo repo ──────────────────────────────────────
  # Se publica aunque algún build haya fallado: se suben los artefactos
  # disponibles y se omiten los que no existieron.
  release:
    name: Publish release
    needs: build
    if: always() && !cancelled() && needs.build.result != 'skipped'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
        continue-on-error: true

      - name: Check artifacts exist
        run: |
          ls artifacts/ || { echo "No artifacts found"; exit 1; }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: PDF Anonymizer ${{ github.event.inputs.version }}
          body: |
            ## PDF Anonymizer ${{ github.event.inputs.version }}

            Anonimización automática de documentos PDF conforme al RGPD.
            Procesamiento 100% local — sin conexión a Internet.

            ### Descargas

            | Plataforma | Archivo |
            |---|---|
            | macOS — Apple Silicon (M1/M2/M3/M4) | `PDFAnonymizer-macOS-AppleSilicon.zip` |
            | Windows 10/11 (x64) | `PDFAnonymizer-Windows.zip` |
            | Linux (Ubuntu 22.04+) | `PDFAnonymizer-Linux.tar.gz` |

            > **Los modelos de IA no están incluidos** (~6.5 GB).
            > Descárgalos por separado y colócalos en la carpeta `models/` junto a la aplicación.
          files: artifacts/*
          draft: false
          prerelease: false
